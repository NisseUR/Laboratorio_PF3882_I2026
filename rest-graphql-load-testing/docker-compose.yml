services:

  postgres:

    image: postgres:16

    container_name: postgres-db

    restart: unless-stopped

    environment:

      POSTGRES_DB: ecommerce

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:

      - "${POSTGRES_HOST_PORT:-5433}:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data:
